name: Release (public npm)

# ---------------------------------------------------------------------------
# Public-npm release pipeline (Changesets). Two channels:
#
#   `next`   — EVERY merge to main that carries a changeset publishes a snapshot
#              prerelease (0.X.Y-next-<datetime>) to the `next` dist-tag, so
#              `npm i @lando-labs/lando-ds@next` tracks the bleeding edge.
#              Handled by the `publish-next` job.
#   `latest` — stable. Only cut when the "Version Packages" PR is merged, which
#              runs `npm run release` to publish `@lando-labs/lando-ds` (+ the
#              `@lando-labs/lando-ds-meta` artifact) to `latest` WITH PROVENANCE,
#              then creates the GitHub Release + git tag. Handled by `release`.
#
# So on each push to main the changesets action either:
#   - opens/updates the "Version Packages" PR (→ `release` has nothing to
#     publish; `publish-next` cuts a `next` snapshot), OR
#   - publishes the stable release (Version Packages PR was merged → `release`
#     publishes `latest`; `publish-next` is skipped so nothing double-publishes).
#
# Auth is npm OIDC TRUSTED PUBLISHING (no long-lived token): the packages have a
# trusted publisher on npmjs.com pointing at this workflow (`release.yml`).
# Requires `id-token: write` and npm >= 11.5.1 (upgraded in a step).
#
# The `release`/`publish-next` jobs are guarded by
#     if: github.repository == 'lando-labs/lando-ds'
# so forks never publish — only this repository can.
# ---------------------------------------------------------------------------

on:
  push:
    branches:
      - main

# Serialize releases: never let two publish runs race on the same ref.
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version PR or Publish to npm
    runs-on: ubuntu-latest

    # ---- Fork-safety guard (job level) -----------------------------------
    # Only this repository publishes — forks evaluate the guard to false and
    # skip the job. Do not remove or weaken it.
    if: github.repository == 'lando-labs/lando-ds'

    # Surfaced to the `publish-next` job below so it can tell a stable release
    # (Version Packages PR merged → `published: true`) from a feature merge that
    # left changesets pending (→ publish a `next` snapshot instead).
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}

    permissions:
      contents: write # commit version bump, push git tags, create GitHub Releases
      pull-requests: write # open/update the "Version Packages" PR
      id-token: write # OIDC token for npm provenance (sigstore signing)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Full history so the changelog generator can resolve commit/PR links.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          # Pin the publish target to PUBLIC npm explicitly (this repo's
          # publishConfig historically pointed at GitHub Packages; being
          # explicit here guarantees the release targets npmjs.org).
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # OIDC trusted publishing needs npm >= 11.5.1. Node 20 ships npm 10.x, so
      # upgrade the global npm before it publishes. Pin to the 11.x line: `@latest`
      # now resolves to npm 12, which dropped Node 20 (requires node >=22.22) and
      # fails here with EBADENGINE. npm 11.x supports node ^20.17 and has OIDC.
      - name: Upgrade npm (OIDC trusted publishing needs >= 11.5.1)
        run: npm install -g "npm@^11.5.1"

      - name: Install dependencies
        run: npm ci

      - name: Create Release PR or Publish to npm
        id: changesets
        # Pin an exact version: changesets/action ships no moving major tag —
        # neither `@v1` nor `@v2` resolves, only `vX.Y.Z` (and `v2.0.0-next.*`
        # prereleases). Pinning also keeps a retagged action from sliding in.
        uses: changesets/action@v1.9.0
        with:
          # The inputs are `publish` / `version` — NOT `publish-script` /
          # `version-script`. Unknown `with:` keys are silently ignored, which
          # would leave the action with no publish command at all.
          #
          # `npm run release` builds a fresh dist/ then runs `changeset publish`.
          publish: npm run release
          # `npm run version-packages` runs `changeset version` (bumps
          # package.json + writes CHANGELOG.md for the "Version Packages" PR).
          version: npm run version-packages
          createGithubReleases: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          # npm auth is via OIDC TRUSTED PUBLISHING — no long-lived token.
          # `@lando-labs/lando-ds` has a trusted publisher configured on npmjs.com
          # (GitHub Actions → lando-labs/lando-ds → workflow `release.yml`), so
          # `npm publish` (run by `changeset publish`) mints a short-lived OIDC
          # token from the `id-token: write` permission above.
          # Provenance attestations are emitted automatically under trusted
          # publishing; the explicit flag below is belt-and-suspenders.
          NPM_CONFIG_PROVENANCE: 'true'
          # Token for @changesets/changelog-github to link PRs/commits/authors
          # while generating CHANGELOG.md during `changeset version`.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # The meta artifact package (@lando-labs/lando-ds-meta) is assembled from
      # the just-built dist/ (its version === the DS version) and published
      # SEPARATELY — it is not a changeset-managed package. Gate on a real
      # publish having happened so this only fires when a version actually
      # shipped (not on the "open Version Packages PR" runs). It has its own
      # trusted publisher (also → release.yml), so the same OIDC job can publish
      # it; dist-meta/package.json already sets access: public. Provenance is
      # emitted automatically.
      - name: Publish the meta artifact package (@lando-labs/lando-ds-meta)
        if: steps.changesets.outputs.published == 'true'
        run: |
          npm run assemble:meta
          npm publish ./dist-meta
        env:
          NPM_CONFIG_PROVENANCE: 'true'

  # ---------------------------------------------------------------------------
  # Prerelease channel: publish a `next` snapshot on EVERY merge to main that
  # carries a changeset — so `npm i @lando-labs/lando-ds@next` always tracks the
  # bleeding edge. Stable `latest` is only cut when the Version Packages PR is
  # merged (handled by the `release` job above).
  #
  # Runs ONLY when the release job did NOT publish a stable version but DID see
  # pending changesets — i.e. a normal feature merge that opened/updated the
  # Version Packages PR. When the Version Packages PR itself merges, the release
  # job publishes to `latest` (`published: true`) and this job is skipped, so a
  # version is never double-published to both tags.
  #
  # `npm run release:next` (scripts/release-next.mjs) builds, stamps a calculated
  # snapshot version (e.g. 0.59.0-next-<datetime>), publishes it to the `next`
  # dist-tag with no git tag, then restores the tree. Auth is the SAME OIDC
  # trusted publisher (this is still release.yml); provenance is emitted.
  # ---------------------------------------------------------------------------
  publish-next:
    name: Publish snapshot to the `next` tag
    needs: release
    if: >-
      github.repository == 'lando-labs/lando-ds' &&
      needs.release.outputs.published != 'true' &&
      needs.release.outputs.hasChangesets == 'true'
    runs-on: ubuntu-latest

    permissions:
      id-token: write # OIDC token for npm trusted publishing (+ provenance)
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Upgrade npm (OIDC trusted publishing needs >= 11.5.1)
        run: npm install -g "npm@^11.5.1"

      - name: Install dependencies
        run: npm ci

      - name: Publish snapshot to the `next` dist-tag
        run: npm run release:next
        env:
          NPM_CONFIG_PROVENANCE: 'true'
