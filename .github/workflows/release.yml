name: Release (public npm)

# ---------------------------------------------------------------------------
# Public-npm release pipeline (Changesets).
#
# On every push to `main` the changesets action either:
#   - opens/updates a "Version Packages" PR aggregating pending changesets, OR
#   - if that PR was just merged (no changesets left), runs `npm run release`
#     to publish `@lando-labs/lando-ds` to public npmjs.org WITH PROVENANCE,
#     then creates the GitHub Release + git tag. A follow-on step then assembles
#     and publishes `@lando-labs/lando-ds-meta` (gated on a real publish).
#
# Auth is npm OIDC TRUSTED PUBLISHING (no long-lived token): both packages have
# a trusted publisher on npmjs.com pointing at this workflow (`release.yml`).
# Requires `id-token: write` (below) and npm >= 11.5.1 (upgraded in a step).
#
# The `release` job is guarded by
#     if: github.repository == 'lando-labs/lando-ds'
# so forks never publish — only this repository can.
# ---------------------------------------------------------------------------

on:
  push:
    branches:
      - main

# Serialize releases: never let two publish runs race on the same ref.
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version PR or Publish to npm
    runs-on: ubuntu-latest

    # ---- Fork-safety guard (job level) -----------------------------------
    # Only this repository publishes — forks evaluate the guard to false and
    # skip the job. Do not remove or weaken it.
    if: github.repository == 'lando-labs/lando-ds'

    permissions:
      contents: write # commit version bump, push git tags, create GitHub Releases
      pull-requests: write # open/update the "Version Packages" PR
      id-token: write # OIDC token for npm provenance (sigstore signing)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Full history so the changelog generator can resolve commit/PR links.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          # Pin the publish target to PUBLIC npm explicitly (this repo's
          # publishConfig historically pointed at GitHub Packages; being
          # explicit here guarantees the release targets npmjs.org).
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # OIDC trusted publishing needs npm >= 11.5.1. Node 20 ships npm 10.x, so
      # upgrade the global npm before it publishes. Pin to the 11.x line: `@latest`
      # now resolves to npm 12, which dropped Node 20 (requires node >=22.22) and
      # fails here with EBADENGINE. npm 11.x supports node ^20.17 and has OIDC.
      - name: Upgrade npm (OIDC trusted publishing needs >= 11.5.1)
        run: npm install -g "npm@^11.5.1"

      - name: Install dependencies
        run: npm ci

      - name: Create Release PR or Publish to npm
        id: changesets
        # Pin an exact version: changesets/action ships no moving major tag —
        # neither `@v1` nor `@v2` resolves, only `vX.Y.Z` (and `v2.0.0-next.*`
        # prereleases). Pinning also keeps a retagged action from sliding in.
        uses: changesets/action@v1.9.0
        with:
          # The inputs are `publish` / `version` — NOT `publish-script` /
          # `version-script`. Unknown `with:` keys are silently ignored, which
          # would leave the action with no publish command at all.
          #
          # `npm run release` builds a fresh dist/ then runs `changeset publish`.
          publish: npm run release
          # `npm run version-packages` runs `changeset version` (bumps
          # package.json + writes CHANGELOG.md for the "Version Packages" PR).
          version: npm run version-packages
          createGithubReleases: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          # npm auth is via OIDC TRUSTED PUBLISHING — no long-lived token.
          # `@lando-labs/lando-ds` has a trusted publisher configured on npmjs.com
          # (GitHub Actions → lando-labs/lando-ds → workflow `release.yml`), so
          # `npm publish` (run by `changeset publish`) mints a short-lived OIDC
          # token from the `id-token: write` permission above.
          # Provenance attestations are emitted automatically under trusted
          # publishing; the explicit flag below is belt-and-suspenders.
          NPM_CONFIG_PROVENANCE: 'true'
          # Token for @changesets/changelog-github to link PRs/commits/authors
          # while generating CHANGELOG.md during `changeset version`.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # The meta artifact package (@lando-labs/lando-ds-meta) is assembled from
      # the just-built dist/ (its version === the DS version) and published
      # SEPARATELY — it is not a changeset-managed package. Gate on a real
      # publish having happened so this only fires when a version actually
      # shipped (not on the "open Version Packages PR" runs). It has its own
      # trusted publisher (also → release.yml), so the same OIDC job can publish
      # it; dist-meta/package.json already sets access: public. Provenance is
      # emitted automatically.
      - name: Publish the meta artifact package (@lando-labs/lando-ds-meta)
        if: steps.changesets.outputs.published == 'true'
        run: |
          npm run assemble:meta
          npm publish ./dist-meta
        env:
          NPM_CONFIG_PROVENANCE: 'true'
